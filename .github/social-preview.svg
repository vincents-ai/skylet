<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="skylet-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>
  
  <!-- Subtle grid pattern -->
  <g stroke="#ef4444" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>
  
  <!-- Logo (centered left area) -->
  <g transform="translate(280, 320) scale(2.5)" stroke="#ef4444" fill="none">
    <circle cx="0" cy="0" r="15" stroke-width="1" stroke-dasharray="43 10" stroke-opacity="1"/>
    <circle cx="0" cy="0" r="23" stroke-width="2" stroke-dasharray="43 15" stroke-opacity="0.8"/>
    <circle cx="0" cy="0" r="31" stroke-width="3" stroke-dasharray="43 20" stroke-opacity="0.6"/>
    <circle cx="0" cy="0" r="39" stroke-width="4" stroke-dasharray="43 25" stroke-opacity="0.4"/>
    <circle cx="0" cy="0" r="47" stroke-width="5" stroke-dasharray="43 30" stroke-opacity="0.2"/>
    <rect x="-2" y="-40" width="4" height="80" fill="#ef4444" fill-opacity="0.15" stroke="none"/>
  </g>
  
  <!-- Title -->
  <text x="540" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="url(#text-grad)">Skylet</text>
  
  <!-- Tagline -->
  <text x="540" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#ffffff" fill-opacity="0.9">Secure Plugin Runtime</text>
  
  <!-- Subtitle -->
  <text x="540" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#ffffff" fill-opacity="0.6">for Autonomous Agents &amp; Microservices</text>
  
  <!-- Features -->
  <g font-family="ui-monospace, monospace" font-size="18" fill="#ef4444" fill-opacity="0.8">
    <text x="540" y="500">FFI ABI v2.0</text>
    <text x="720" y="500">Capability-based Security</text>
    <text x="1000" y="500">Hot Reload</text>
  </g>
  
  <!-- Rust badge -->
  <g transform="translate(1160, 580)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="#ef4444" fill-opacity="0.2"/>
    <text x="40" y="20" font-family="system-ui, sans-serif" font-size="14" fill="#ef4444" text-anchor="middle">Rust</text>
  </g>
</svg>
