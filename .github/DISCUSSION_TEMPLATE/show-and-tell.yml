title: "Show & Tell: "
labels: ["show-and-tell"]
body:
  - type: textarea
    id: description
    attributes:
      label: What did you build?
      description: Tell us about your project, plugin, or integration
    validations:
      required: true
  - type: textarea
    id: demo
    attributes:
      label: Demo / Screenshots
      description: Share screenshots, code snippets, or links to demos
  - type: input
    id: link
    attributes:
      label: Project Link
      description: Link to your project (GitHub repo, website, etc.)
      placeholder: "https://github.com/..."
