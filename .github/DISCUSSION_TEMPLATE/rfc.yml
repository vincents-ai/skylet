title: "RFC: "
labels: ["rfc"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Brief summary of the proposed change
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this change needed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Detailed Proposal
      description: Detailed description of the proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What alternatives were considered?
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is the impact of this change? (breaking changes, migration path, etc.)
