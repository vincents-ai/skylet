[dev-dependencies]
# Mocking
mockall = "0.12"
mockall_double = "0.3"

# Testing utilities
tokio-test = "0.4"
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1.39"
test-log = "0.2"
tempfile = "3.8"
rand = "0.8"
serde_json = "1.0"

# Mock services
mockito = "1.2"
httpmock = "0.7"

# Security testing
cargo-audit = "0.18"

# Performance analysis
pprof = { version = "0.13", features = ["flamegraph"] }

# Additional testing utilities
anyhow = "1.0"
thiserror = "1.0"
futures = "0.3"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
tracing-test = "0.2"

# Plugin testing
libloading = "0.8"
async-trait = "0.1"

# Benchmarking
walkdir = "2.4"
humantime = "2.1"