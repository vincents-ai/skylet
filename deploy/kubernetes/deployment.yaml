apiVersion: apps/v1
kind: Deployment
metadata:
  name: skylet
  namespace: skylet
  labels:
    app: skylet
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: skylet
  template:
    metadata:
      labels:
        app: skylet
        version: v1
    spec:
      serviceAccountName: skylet
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: skylet
        image: skylet:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: RUST_LOG
          value: "info"
        - name: PLUGIN_DIR
          value: "/app/plugins"
        - name: CONFIG_DIR
          value: "/app/config"
        - name: DATA_DIR
          value: "/app/data"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30
        volumeMounts:
        - name: plugin-storage
          mountPath: /app/plugins
        - name: config-storage
          mountPath: /app/config
        - name: data-storage
          mountPath: /app/data
      volumes:
      - name: plugin-storage
        emptyDir: {}
      - name: config-storage
        emptyDir: {}
      - name: data-storage
        emptyDir: {}
