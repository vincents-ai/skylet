version: '3.8'

services:
  skylet:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile
    image: skylet:latest
    container_name: skylet
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      - RUST_LOG=info
      - PLUGIN_DIR=/app/plugins
      - CONFIG_DIR=/app/config
    volumes:
      - plugin-data:/app/plugins
      - config-data:/app/config
      - app-data:/app/data
    networks:
      - skylet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - skylet-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/monitoring/datasources:/etc/grafana/provisioning/datasources
    networks:
      - skylet-network
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  skylet-network:
    driver: bridge

volumes:
  plugin-data:
  config-data:
  app-data:
  prometheus-data:
  grafana-data:
