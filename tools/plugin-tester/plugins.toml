# Plugin Test Configuration
#
# Test external plugins with configurable test cases
# Add plugins as git dependencies, build, then test
#
# Example plugin repos:
# - vincents-ai/skylet-platform-detect
# - vincents-ai/skylet-security-classifier
# - vincents-ai/skylet-metrics
# - vincents-ai/skylet-system-monitor

# Add your built plugins here
# [[plugins]]
# name = "platform-detect"
# path = "/path/to/your/build/libplatform_detect.so"
#
# [[plugins.tests]]
# name = "init"
# expected_status = "success"
# timeout_ms = 5000
